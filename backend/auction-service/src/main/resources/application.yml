server:
  port: 8082

spring:
  application:
    name: auction-service

  datasource:
    url: jdbc:postgresql://localhost:5433/campus_auctions
    username: campus
    password: campus_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
