spring:
  application:
    name: auction-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: jdbc:postgresql://localhost:5433/campus_auctions
    username: campus
    password: campus_secret
    driver-class-name: org.postgresql.Driver
  devtools:
    restart:
      enabled: true

server:
  port: 8082
  address: 0.0.0.0
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.campus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

# Scheduling configuration
scheduling:
  enabled: true
  auction-activation:
    fixed-rate: 60000  # Check every 60 seconds
  auction-ending:
    fixed-rate: 60000  # Check every 60 seconds
  archive:
    cron: "0 0 0 * * ?"  # Every day at midnight

jwt:
  secret: ${JWT_SECRET:campus-super-secret-key-change-in-production-min-32-chars!!}

services:
  user-service-url: http://localhost:8081
  bidding-service-url: http://localhost:8083
