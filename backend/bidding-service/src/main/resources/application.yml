spring:
  application:
    name: bidding-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: jdbc:postgresql://localhost:5432/bidding_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  devtools:
    restart:
      enabled: true

server:
  port: 8082
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.campus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
