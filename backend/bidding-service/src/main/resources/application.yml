server:
  port: 8083

spring:
  application:
    name: bidding-service

  datasource:
    url: jdbc:postgresql://localhost:5434/campus_bids
    username: campus
    password: campus_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect