server:
  port: 8084

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5435/campus_payments
    username: ${DB_USER:campus}
    password: ${DB_PASSWORD:campus_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Must match the secret used by the User Service so JWTs are mutually valid.
# Override via JWT_SECRET environment variable in production.
jwt:
  secret: ${JWT_SECRET:campus-super-secret-key-change-in-production-min-32-chars!!}
